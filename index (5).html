<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SADOP - Mapa Territorial</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f7fa;color:#1a202c;overflow:hidden;height:100vh}
#app{display:flex;height:100vh}
#sb{width:360px;min-width:360px;background:#fff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;overflow:hidden}
.hdr{padding:16px 18px 12px;border-bottom:1px solid #e2e8f0;background:#f8fafc}
.hdr h1{font-size:15px;font-weight:700;color:#111827}
.hdr p{font-size:10px;color:#64748b;margin-top:3px}
.sbar{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;padding:8px 10px;border-bottom:1px solid #e2e8f0;background:#f8fafc}
.sbar .s{text-align:center;padding:5px 2px}
.sbar .n{font-size:15px;font-weight:700}
.sbar .l{font-size:8px;color:#64748b;text-transform:uppercase}
.lgd{display:flex;gap:6px;padding:8px 12px;border-bottom:1px solid #e2e8f0;flex-wrap:wrap}
.lgd span{display:flex;align-items:center;gap:4px;font-size:9px;color:#4a5568}
.lgd i{width:8px;height:8px;border-radius:50%;display:inline-block}
.flt{padding:7px 10px;border-bottom:1px solid #e2e8f0;display:flex;gap:5px}
.flt select,.flt input{background:#fff;color:#1a202c;border:1px solid #e2e8f0;border-radius:6px;padding:6px 8px;font-size:11px;flex:1;font-family:inherit}
.flt input::placeholder{color:#a0aec0}
#list{flex:1;overflow-y:auto}
#list::-webkit-scrollbar{width:3px}
#list::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px}
.si{padding:8px 12px;border-bottom:1px solid #f0f0f0;cursor:pointer;display:flex;align-items:flex-start;gap:8px}
.si:hover{background:rgba(59,130,246,0.04)}
.dot{width:10px;height:10px;border-radius:50%;margin-top:4px;flex-shrink:0}
.sn{font-size:11px;font-weight:600;color:#1a202c;line-height:1.3}
.sd{font-size:10px;color:#718096;margin-top:2px}
.bdg{font-size:9px;padding:2px 5px;border-radius:3px;font-weight:600;display:inline-block;margin:4px 3px 0 0}
#map{flex:1;height:100vh}
.pop h3{font-size:13px;font-weight:700;color:#1a1a2e;margin-bottom:6px;line-height:1.3}
.pop .r{font-size:11px;color:#555;margin-bottom:3px}
.pop .bx{display:flex;gap:8px;margin:8px 0}
.pop .bx div{flex:1;text-align:center;padding:5px;background:#f0f4f8;border-radius:5px}
.pop .bx .v{font-size:18px;font-weight:700;color:#1a1a2e}
.pop .bx .t{font-size:8px;color:#888;text-transform:uppercase}
.pop .pct{text-align:center;padding:6px;border-radius:6px;font-weight:700;font-size:14px;margin-top:4px}
.tbtn{position:absolute;top:10px;right:10px;z-index:1000;background:#ffffffee;color:#4a5568;border:1px solid #e2e8f0;padding:7px 12px;border-radius:7px;font-size:11px;cursor:pointer;font-family:inherit}
.tbtn:hover{background:#f0f4f8;color:#1a202c}
#status{position:absolute;top:50px;right:10px;z-index:1000;background:#ffffffee;border:1px solid #e2e8f0;border-radius:7px;padding:6px 14px;font-size:11px;color:#4a5568;display:none}
.info{position:absolute;bottom:12px;left:12px;z-index:1000;background:#ffffffee;border:1px solid #e2e8f0;border-radius:8px;padding:10px 14px;font-size:10px;color:#718096;max-width:300px;line-height:1.5}
@media(max-width:768px){#sb{width:100%;min-width:100%;height:40vh}#app{flex-direction:column}#map{height:60vh}}
</style>
</head>

var map=L.map("map").setView([-34.53,-58.53],12);
L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",{attribution:"OSM CARTO",maxZoom:19}).addTo(map);
var markers=[];

function sem(a){
if(a===0)return{c:"#ef4444",bg:"#fef2f2",bc:"#fecaca"};
if(a<=5)return{c:"#f59e0b",bg:"#fffbeb",bc:"#fde68a"};
if(a<=10)return{c:"#f97316",bg:"#fff7ed",bc:"#fed7aa"};
return{c:"#22c55e",bg:"#f0fdf4",bc:"#bbf7d0"};
}

function gf(){
var d=document.getElementById("fd").value;
var q=document.getElementById("fs").value.toLowerCase();
return DATA.filter(function(s){
if(d!=="T"&&s.d!==d)return false;
if(q&&s.n.toLowerCase().indexOf(q)<0&&s.dom.toLowerCase().indexOf(q)<0)return false;
return true;
});
}

function render(){
markers.forEach(function(m){map.removeLayer(m)});
markers=[];
var f=gf();
var bounds=[];
var rojo=0,amar=0,nar=0,verde=0;

f.forEach(function(s,i){
var sm=sem(s.a);
var sz=s.a>10?18:s.a>5?14:s.a>0?11:8;
if(s.a===0)rojo++;
else if(s.a<=5)amar++;
else if(s.a<=10)nar++;
else verde++;

var ic=L.divIcon({className:"",html:'<div style="width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:'+sm.c+';border:2px solid rgba(255,255,255,0.9);box-shadow:0 2px 6px rgba(0,0,0,0.25);cursor:pointer"></div>',iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]});
var mk=L.marker([s.lt,s.lg],{icon:ic});
mk.bindPopup('<div class="pop"><h3>'+s.n+'</h3><div class="r">'+s.dom+'</div><div class="r">'+s.d+' - '+s.loc+'</div>'+(s.tel?'<div class="r">Tel: '+s.tel+'</div>':'')+(s.em?'<div class="r" style="font-size:10px;word-break:break-all">'+s.em+'</div>':'')+'<div class="r">'+s.niv+'</div><div class="bx"><div><div class="v">'+s.a+'</div><div class="t">Afiliados</div></div><div><div class="v">'+(s.td||"-")+'</div><div class="t">Docentes</div></div></div>'+(s.del?'<div class="r">Delegados: '+s.del+'</div>':'')+'<div class="pct" style="color:'+sm.c+';background:'+sm.c+'15;border:1px solid '+sm.c+'33">'+(s.est||"Sin datos")+'</div></div>',{maxWidth:280});
mk.addTo(map);
markers.push(mk);
bounds.push([s.lt,s.lg]);
});

if(bounds.length)map.fitBounds(bounds,{padding:[30,30]});
document.getElementById("st-t").textContent=f.length;
document.getElementById("st-r").textContent=rojo;
document.getElementById("st-a").textContent=amar;
document.getElementById("st-o").textContent=nar;
document.getElementById("st-v").textContent=verde;

var h="";
f.forEach(function(s,i){
var sm=sem(s.a);
h+='<div class="si" onclick="fc('+i+')"><div class="dot" style="background:'+sm.c+'"></div><div style="flex:1;min-width:0"><div class="sn">'+s.n+'</div><div class="sd">'+s.dom+' - '+s.d+'</div><div><span class="bdg" style="background:'+sm.bg+';color:'+sm.c+';border:1px solid '+sm.bc+'">'+s.a+' afil.</span>'+(s.td>0?'<span class="bdg" style="background:#f7fafc;color:#4a5568;border:1px solid #e2e8f0">'+s.td+' doc.</span>':'')+'</div></div></div>';
});
document.getElementById("list").innerHTML=h||'<div style="padding:30px;text-align:center;color:#a0aec0;font-size:12px">Sin resultados</div>';
}

function fc(i){
var f=gf();var s=f[i];if(!s)return;
map.setView([s.lt,s.lg],16);
markers.forEach(function(m){var p=m.getLatLng();if(Math.abs(p.lat-s.lt)<0.0001&&Math.abs(p.lng-s.lg)<0.0001)m.openPopup()});
}

render();
</script>
